<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nettoyer fichier CSV</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    
    <h1>Nettoyer fichier CSV</h1>
    
    <form method="post" id="csvForm" class="flex flex-col items-center">
        <label for="csvFile" class="mb-2">Télécharger le fichier CSV:</label>
        <input type="file" id="csvFile" accept=".csv" class="mb-4">
        <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded">Nettoyage</button>
    </form>
    <script src="/static/main.js"></script>

</body>
</html>
