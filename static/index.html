<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nettoyeur de contacts CSV</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[var(--canvas)] text-[var(--ink)] antialiased">

    <div class="max-w-5xl mx-auto px-4 py-10 sm:py-14">

        <header class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-[var(--accent)]/10 mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="var(--accent)" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09Z" />
                </svg>
            </div>
            <h1 class="text-2xl sm:text-3xl font-semibold tracking-tight">Nettoyeur de contacts CSV</h1>
            <p class="mt-2 text-[var(--ink-secondary)] max-w-md mx-auto">
                Normalisez les téléphones, harmonisez les noms et supprimez les doublons en un clic.
            </p>
        </header>

        <section class="bg-[var(--surface)] border border-[var(--hairline)] rounded-2xl shadow-sm p-6 sm:p-8">
            <form id="csvForm">
                <label id="dropZone" for="csvFile"
                    class="group flex flex-col items-center justify-center gap-3 rounded-xl border-2 border-dashed border-[var(--hairline)] px-6 py-10 cursor-pointer transition-colors hover:border-[var(--accent)] hover:bg-[var(--accent)]/5">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        class="w-8 h-8 text-[var(--ink-muted)] group-hover:text-[var(--accent)] transition-colors">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 7.5m0 0L7.5 12m4.5-4.5v13.5" />
                    </svg>
                    <span class="text-sm text-[var(--ink-secondary)] text-center">
                        <span class="font-medium text-[var(--accent)]">Choisissez un fichier</span> ou glissez-le ici
                    </span>
                    <span id="fileName" class="text-xs text-[var(--ink-muted)]">Aucun fichier sélectionné</span>
                    <input type="file" id="csvFile" accept=".csv" class="sr-only">
                </label>

                <button type="submit" id="submitBtn"
                    class="mt-6 w-full inline-flex items-center justify-center gap-2 rounded-lg bg-[var(--accent)] text-white font-medium px-4 py-2.5 transition-opacity hover:opacity-90 disabled:opacity-50 disabled:cursor-not-allowed">
                    <svg id="submitSpinner" class="hidden animate-spin w-4 h-4" viewBox="0 0 24 24" fill="none">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                    <span id="submitLabel">Nettoyer le fichier</span>
                </button>
            </form>

            <p id="errorMessage" role="alert" class="hidden mt-4 flex items-center gap-2 rounded-lg bg-[var(--danger-bg)] text-[var(--danger-ink)] text-sm px-4 py-3">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 shrink-0">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
                </svg>
                <span id="errorText"></span>
            </p>
        </section>

        <section id="results" class="hidden mt-8">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">
                <div class="flex items-center gap-4 bg-[var(--surface)] border border-[var(--hairline)] rounded-xl px-5 py-4">
                    <div class="flex items-center justify-center w-10 h-10 rounded-full bg-[var(--good)]/10 shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="var(--good)" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                        </svg>
                    </div>
                    <div>
                        <p id="statDuplicates" class="text-xl font-semibold leading-tight">0</p>
                        <p class="text-sm text-[var(--ink-secondary)]">Doublons supprimés</p>
                    </div>
                </div>
                <div class="flex items-center gap-4 bg-[var(--surface)] border border-[var(--hairline)] rounded-xl px-5 py-4">
                    <div class="flex items-center justify-center w-10 h-10 rounded-full bg-[var(--good)]/10 shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="var(--good)" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 0 0 2.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 0 1-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 0 0-1.091-.852H4.5A2.25 2.25 0 0 0 2.25 4.5v2.25Z" />
                        </svg>
                    </div>
                    <div>
                        <p id="statPhones" class="text-xl font-semibold leading-tight">0</p>
                        <p class="text-sm text-[var(--ink-secondary)]">Numéros reformatés</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div>
                    <h2 class="text-sm font-semibold uppercase tracking-wide text-[var(--ink-muted)] mb-2">Avant</h2>
                    <div id="beforeTable" class="overflow-x-auto rounded-xl border border-[var(--hairline)] bg-[var(--surface)]"></div>
                </div>
                <div>
                    <h2 class="text-sm font-semibold uppercase tracking-wide text-[var(--ink-muted)] mb-2">Après</h2>
                    <div id="afterTable" class="overflow-x-auto rounded-xl border border-[var(--hairline)] bg-[var(--surface)]"></div>
                </div>
            </div>

            <button id="downloadBtn" type="button"
                class="mt-8 inline-flex items-center gap-2 rounded-lg bg-[var(--good)] text-white font-medium px-5 py-2.5 hover:opacity-90 transition-opacity">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 12m0 0 4.5-4.5M12 12V3" />
                </svg>
                Télécharger le fichier nettoyé
            </button>
        </section>

    </div>

    <script src="/static/main.js"></script>

</body>
</html>
